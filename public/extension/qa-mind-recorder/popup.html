<!DOCTYPE html>
<html data-theme="light">
<head>
  <meta charset="UTF-8" />
  <title>QA Mind Recorder</title>
  <style>
    :root {
      --terracotta: #c2552e;
      --terracotta-bright: #d9744a;
      --terracotta-deep: #9e4220;
      --paper: #efe8df;
      --surface: #e9e1d6;
      --border: #dcd3c4;
      --text: #2a2420;
      --muted: #5f574c;
      --raised: #f8f3ec;
      --field: #fffaf4;
      --danger: #b04e3d;
      --success: #5e7a4f;
      --shadow: 0 18px 50px rgba(42, 36, 32, 0.14);
      color-scheme: light;
    }

    :root[data-theme="dark"] {
      --paper: #1a1613;
      --surface: #221c16;
      --border: #362b1f;
      --text: #ece3d6;
      --muted: #b5ab9b;
      --raised: #2a2119;
      --field: #1f1914;
      --danger: #cc6243;
      --success: #86a56e;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html {
      margin: 0;
      background: transparent;
      border-radius: 24px;
      overflow: hidden;
    }

    body {
      width: 400px;
      margin: 0;
      background: transparent;
      color: var(--text);
      font-family: "Hanken Grotesk", "Segoe UI", Arial, sans-serif;
      border-radius: 24px;
      overflow: hidden;
    }

    .app {
      padding: 18px;
      background:
        linear-gradient(145deg, rgba(194, 85, 46, 0.08), transparent 34%),
        var(--paper);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: var(--terracotta);
      color: #ece3d6;
      font-family: "Bricolage Grotesque", "Segoe UI", Arial, sans-serif;
      font-size: 23px;
      font-weight: 700;
      line-height: 1;
      box-shadow: var(--shadow);
    }

    .brand-title {
      font-family: "Bricolage Grotesque", "Segoe UI", Arial, sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand-title span {
      color: var(--terracotta);
    }

    .brand-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
      white-space: nowrap;
    }

    .theme-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      padding: 3px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      flex: 0 0 auto;
    }

    .theme-toggle button {
      width: 42px;
      min-height: 28px;
      padding: 0;
      border-radius: 11px;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      border: 0;
    }

    .theme-toggle button[aria-pressed="true"] {
      background: var(--terracotta);
      color: #fffaf4;
    }

    .status {
      padding: 12px 13px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: var(--raised);
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
      box-shadow: 0 10px 30px rgba(42, 36, 32, 0.07);
    }

    .status strong {
      color: var(--text);
      font-weight: 700;
    }

    label {
      display: block;
      font-family: "IBM Plex Mono", "Cascadia Mono", Consolas, monospace;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 12px 0 7px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 11px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      background: var(--field);
      font-family: inherit;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--terracotta);
      box-shadow: 0 0 0 3px rgba(194, 85, 46, 0.18);
    }

    select:disabled {
      opacity: 0.72;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 7px;
      line-height: 1.4;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 15px;
    }

    button {
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 11px 12px;
      font-family: inherit;
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      transition: transform 0.08s ease, opacity 0.15s ease, background 0.16s ease, border-color 0.16s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .primary {
      background: var(--terracotta);
      color: #fffaf4;
    }

    .primary:hover {
      background: var(--terracotta-bright);
    }

    .secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .secondary:hover {
      background: var(--raised);
    }

    .danger {
      background: var(--danger);
      color: #fffaf4;
    }

    .full {
      grid-column: span 2;
    }

    .mini {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 11px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 9px;
      background: var(--raised);
      border: 1px solid var(--border);
      border-radius: 999px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }

    .dot.on {
      background: var(--success);
    }

    .dot.off {
      background: var(--danger);
    }

    .checkbox-line {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 12px;
      padding: 10px 11px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--raised);
    }

    .checkbox-line input {
      width: auto;
      accent-color: var(--terracotta);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo">Q</div>
        <div>
          <div class="brand-title">QAMind <span>AI</span></div>
          <div class="brand-subtitle">Journey recorder</div>
        </div>
      </div>
      <div class="theme-toggle" aria-label="Theme">
        <button id="lightModeBtn" type="button" aria-pressed="true">Light</button>
        <button id="darkModeBtn" type="button" aria-pressed="false">Dark</button>
      </div>
    </div>

    <div class="status" id="statusBox">
      <strong>Status:</strong> <span id="statusText">Checking...</span>
    </div>

    <label for="userGoalInput">User Goal</label>
    <textarea id="userGoalInput" placeholder="Example: Create a new Amazon account using mobile number and verify OTP flow"></textarea>

    <div class="row">
      <div>
        <label for="projectSelect">Project</label>
        <select id="projectSelect">
          <option value="">Open QAMind to sync projects</option>
        </select>
      </div>
      <div>
        <label for="moduleInput">Module</label>
        <input id="moduleInput" placeholder="Authentication" />
      </div>
    </div>

    <div class="hint" id="connectionHint">
      Open QAMind AI while signed in to sync your project list.
    </div>

    <div class="checkbox-line">
      <input type="checkbox" id="debugDownloadInput" />
      <span>Also download full debug JSON</span>
    </div>

    <div class="hint">
      Default download is compact AI-ready JSON. Debug JSON is larger and only for recorder debugging.
    </div>

    <div class="controls">
      <button class="primary" id="startBtn">Start Recording</button>
      <button class="danger" id="stopBtn">Stop & Download</button>
      <button class="secondary full" id="clearBtn">Clear Recording</button>
    </div>

    <div class="mini">
      <span class="pill">
        <span class="dot" id="recordingDot"></span>
        <span id="recordingLabel">Idle</span>
      </span>
      <span id="eventCount">0 events</span>
    </div>
  </div>

  <script src="processor.js"></script>
  <script src="popup.js"></script>
</body>
</html>
