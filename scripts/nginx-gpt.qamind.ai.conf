# Nginx site for gpt.qamind.ai
# Install on VPS:
#   sudo cp scripts/nginx-gpt.qamind.ai.conf /etc/nginx/sites-available/gpt.qamind.ai
#   sudo ln -sf /etc/nginx/sites-available/gpt.qamind.ai /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d gpt.qamind.ai
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name gpt.qamind.ai;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
